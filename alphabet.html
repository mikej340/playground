<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Alphabet Trainer</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body, #root { height: 100%; overflow: hidden; overscroll-behavior: none; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

const DIRECTIONS = { N2L: "N→L", L2N: "L→N", MIX: "Mix", WORD: "Word" };
const MODES = { PRACTICE: "Practice", SPRINT: "Sprint" };

const letterFor = (n) => String.fromCharCode(64 + n);
const numberFor = (l) => l.toUpperCase().charCodeAt(0) - 64;

const WORDS = [
  "cat","dog","run","sky","owl","tea","map","pen","jar","fox",
  "moon","salt","ship","code","leaf","wolf","jazz","quiz","kite","frog",
  "echo","rain","wave","mint","bird","harp","comb","drum","vine","zinc",
  "amber","cloud","piano","river","flame","ghost","pixel","forge","glove","tiger",
  "onion","quilt","bravo","clasp","dwarf","ember","flint","glyph","haven","ivory",
  "garden","puzzle","shadow","rhythm","wizard","jungle","silver","canvas","breeze","velvet",
  "lantern","compass","quantum","whisper","harvest","mystery","crystal","journey","twilight","kingdom",
];

const randomWord = () => WORDS[Math.floor(Math.random() * WORDS.length)];
const wordToNumbers = (w) => w.toUpperCase().split("").map(numberFor).join(" ");

function makePrompt(direction) {
  if (direction === "WORD") {
    const w = randomWord();
    return { kind: "WORD", question: wordToNumbers(w), answer: w.toUpperCase() };
  }
  const n = Math.floor(Math.random() * 26) + 1;
  let dir = direction;
  if (direction === "MIX") dir = Math.random() < 0.5 ? "N2L" : "L2N";
  if (dir === "N2L") return { kind: "N2L", question: String(n), answer: letterFor(n) };
  return { kind: "L2N", question: letterFor(n), answer: String(n) };
}

function normalize(input, kind) {
  const s = input.trim();
  if (!s) return "";
  if (kind === "L2N") return s.replace(/^0+/, "");
  return s.toUpperCase();
}

function AlphabetTrainer() {
  const [mode, setMode] = useState("PRACTICE");
  const [direction, setDirection] = useState("N2L");
  const [prompt, setPrompt] = useState(() => makePrompt("N2L"));
  const [input, setInput] = useState("");
  const [feedback, setFeedback] = useState(null);
  const [stats, setStats] = useState({ correct: 0, wrong: 0, streak: 0, best: 0 });
  const [sprintActive, setSprintActive] = useState(false);
  const [timeLeft, setTimeLeft] = useState(60);
  const [sprintResult, setSprintResult] = useState(null);
  const inputRef = useRef(null);
  const tickRef = useRef(null);
  const fbRef = useRef(null);

  const [vh, setVh] = useState(null);
  useEffect(() => {
    const vv = window.visualViewport;
    if (!vv) return;
    const update = () => setVh(vv.height);
    update();
    vv.addEventListener("resize", update);
    vv.addEventListener("scroll", update);
    return () => {
      vv.removeEventListener("resize", update);
      vv.removeEventListener("scroll", update);
    };
  }, []);

  useEffect(() => { inputRef.current?.focus(); }, [prompt, mode, sprintActive]);

  useEffect(() => {
    if (!sprintActive) return;
    tickRef.current = setInterval(() => {
      setTimeLeft((t) => {
        if (t <= 1) {
          clearInterval(tickRef.current);
          setSprintActive(false);
          setSprintResult((p) => p ?? "done");
          return 0;
        }
        return t - 1;
      });
    }, 1000);
    return () => clearInterval(tickRef.current);
  }, [sprintActive]);

  useEffect(() => {
    setPrompt(makePrompt(direction));
    setInput("");
    setFeedback(null);
  }, [direction]);

  const nextPrompt = useCallback(() => {
    setPrompt(makePrompt(direction));
    setInput("");
  }, [direction]);

  const startSprint = () => {
    setStats({ correct: 0, wrong: 0, streak: 0, best: 0 });
    setTimeLeft(60);
    setSprintResult(null);
    setFeedback(null);
    setInput("");
    setPrompt(makePrompt(direction));
    setSprintActive(true);
  };

  const endSprint = () => {
    setSprintActive(false);
    clearInterval(tickRef.current);
    setSprintResult("stopped");
  };

  const reset = () => {
    setStats({ correct: 0, wrong: 0, streak: 0, best: 0 });
    setFeedback(null);
    setInput("");
    setPrompt(makePrompt(direction));
    setSprintResult(null);
  };

  const submit = (value) => {
    const normalized = normalize(value, prompt.kind);
    if (!normalized) return;
    const ok = normalized === prompt.answer;

    if (ok) {
      setStats((s) => {
        const streak = s.streak + 1;
        return { correct: s.correct + 1, wrong: s.wrong, streak, best: Math.max(s.best, streak) };
      });
      if (mode === "PRACTICE") {
        setFeedback({ kind: "ok" });
        clearTimeout(fbRef.current);
        fbRef.current = setTimeout(() => setFeedback(null), 350);
      }
      nextPrompt();
    } else {
      setStats((s) => ({ ...s, wrong: s.wrong + 1, streak: 0 }));
      if (mode === "PRACTICE") {
        setFeedback({ kind: "bad", was: prompt.answer });
        clearTimeout(fbRef.current);
        fbRef.current = setTimeout(() => setFeedback(null), 900);
        setInput("");
      } else {
        nextPrompt();
      }
    }
  };

  const handleKey = (e) => { if (e.key === "Enter") submit(input); };

  const handleChange = (e) => {
    const v = e.target.value;
    setInput(v);
    if (mode === "SPRINT" && !sprintActive) return;
    if (prompt.kind === "N2L") {
      const c = v.trim();
      if (c.length >= 1 && /^[A-Za-z]$/.test(c)) submit(c);
    }
  };

  const total = stats.correct + stats.wrong;
  const accuracy = total === 0 ? 0 : Math.round((stats.correct / total) * 100);
  const inputDisabled = mode === "SPRINT" && !sprintActive;
  const showResult = mode === "SPRINT" && !sprintActive && sprintResult && total > 0;
  const showStartScreen = mode === "SPRINT" && !sprintActive && !sprintResult;

  return (
    <div className="w-full bg-stone-100 text-stone-900 flex flex-col overflow-hidden"
      style={{
        fontFamily: "ui-sans-serif, system-ui, -apple-system, sans-serif",
        height: vh ? `${vh}px` : "100dvh",
      }}>
      <style>{`
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
        .pulse-ok { animation: po .35s ease-out; }
        .pulse-bad { animation: sh .35s ease-in-out; }
        @keyframes po { 0%{transform:scale(1)} 40%{transform:scale(1.03)} 100%{transform:scale(1)} }
        @keyframes sh { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
        .tick { animation: tk 1s steps(1,end) infinite; }
        @keyframes tk { 50%{opacity:.4} }
      `}</style>

      {/* Top bar */}
      <div className="px-4 pt-4 pb-2 flex items-center justify-between">
        <div className="flex gap-1 bg-stone-200 rounded-full p-0.5">
          {Object.entries(MODES).map(([k, v]) => (
            <button
              key={k}
              onClick={() => {
                if (sprintActive) endSprint();
                setMode(k);
                reset();
              }}
              className={`text-xs font-medium px-3 py-1.5 rounded-full transition ${
                mode === k ? "bg-stone-900 text-stone-50" : "text-stone-600"
              }`}
            >
              {v}
            </button>
          ))}
        </div>

        {mode === "SPRINT" ? (
          <div className={`mono text-lg font-bold tabular-nums ${timeLeft <= 10 && sprintActive ? "text-orange-700 tick" : "text-stone-700"}`}>
            {String(Math.floor(timeLeft / 60))}:{String(timeLeft % 60).padStart(2, "0")}
          </div>
        ) : (
          <div className="mono text-xs text-stone-500 tabular-nums">
            {stats.correct}<span className="text-stone-400">/</span>{total}
          </div>
        )}
      </div>

      {/* Direction pills */}
      <div className="px-4 pb-3">
        <div className="grid grid-cols-4 gap-1.5">
          {Object.entries(DIRECTIONS).map(([k, v]) => (
            <button
              key={k}
              onClick={() => setDirection(k)}
              disabled={sprintActive}
              className={`text-xs font-medium py-1.5 rounded-full border transition disabled:opacity-40 ${
                direction === k
                  ? "bg-stone-900 text-stone-50 border-stone-900"
                  : "bg-white text-stone-600 border-stone-300"
              }`}
            >
              {v}
            </button>
          ))}
        </div>
      </div>

      {/* Stage */}
      <div className="flex-1 flex flex-col items-center justify-center px-6 py-4">
        {showResult ? (
          <div className="w-full max-w-sm text-center">
            <div className="text-7xl font-black tabular-nums">{stats.correct}</div>
            <div className="mono text-xs text-stone-500 mt-3 tabular-nums">
              {accuracy}% · streak {stats.best}
            </div>
            <button
              onClick={startSprint}
              className="mt-10 w-full py-4 rounded-2xl bg-stone-900 text-stone-50 text-base font-semibold active:bg-orange-700 transition"
            >
              Again
            </button>
          </div>
        ) : showStartScreen ? (
          <button
            onClick={startSprint}
            className="w-full max-w-sm py-5 rounded-2xl bg-stone-900 text-stone-50 text-lg font-semibold active:bg-orange-700 transition"
          >
            Start
          </button>
        ) : (
          <div className={`w-full text-center ${
            feedback?.kind === "ok" ? "pulse-ok" : feedback?.kind === "bad" ? "pulse-bad" : ""
          }`}>
            <div className={`font-black leading-none tracking-tight select-none break-words ${
              prompt.kind === "WORD" ? "mono text-3xl tracking-wide" : "text-8xl"
            }`}>
              {prompt.question}
            </div>

            <input
              ref={inputRef}
              value={input}
              onChange={handleChange}
              onKeyDown={handleKey}
              disabled={inputDisabled}
              inputMode={prompt.kind === "L2N" ? "numeric" : "text"}
              maxLength={prompt.kind === "WORD" ? 20 : prompt.kind === "L2N" ? 3 : 2}
              className="mt-10 mono w-full max-w-xs text-center text-3xl font-bold tracking-widest bg-transparent border-b-2 border-stone-300 focus:border-stone-900 outline-none py-3 disabled:opacity-40"
              autoComplete="off"
              autoCapitalize="characters"
              autoCorrect="off"
              spellCheck={false}
            />

            <div className="h-6 mt-3 mono text-sm">
              {feedback?.kind === "ok" && <span className="text-green-700">✓</span>}
              {feedback?.kind === "bad" && <span className="text-red-700">{feedback.was}</span>}
            </div>
          </div>
        )}
      </div>

      {/* Bottom action bar */}
      {!showResult && !showStartScreen && (
        <div className="px-4 pb-6 pt-2 flex gap-2">
          {prompt.kind !== "N2L" && (
            <button
              onClick={() => submit(input)}
              disabled={inputDisabled || !input.trim()}
              className="flex-1 py-4 rounded-2xl bg-stone-900 text-stone-50 text-base font-semibold active:bg-orange-700 transition disabled:opacity-30"
            >
              Enter
            </button>
          )}
          {mode === "SPRINT" && sprintActive && (
            <button
              onClick={endSprint}
              className={`${prompt.kind === "N2L" ? "flex-1" : "px-6"} py-4 rounded-2xl bg-stone-200 text-stone-600 text-sm font-medium active:bg-stone-300 transition`}
            >
              Stop
            </button>
          )}
          {mode === "PRACTICE" && prompt.kind === "N2L" && (
            <button
              onClick={reset}
              className="flex-1 py-4 rounded-2xl bg-stone-200 text-stone-600 text-sm font-medium active:bg-stone-300 transition"
            >
              Reset
            </button>
          )}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<AlphabetTrainer />);
</script>
</body>
</html>
