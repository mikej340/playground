<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Alphabet Trainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      background: #f5f5f4;
      color: #1c1917;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    input {
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }

.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
.tabular { font-variant-numeric: tabular-nums; }

/* Layout */
.app {
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Stage */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 24px 16px;
  min-height: 0;
}
.stage-inner {
  width: 100%;
  text-align: center;
}
.prompt {
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.025em;
  user-select: none;
  word-break: break-word;
  font-size: 96px;
}
.prompt.word {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 30px;
  letter-spacing: 0.05em;
}
.input {
  margin-top: 40px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 0.1em;
  background: transparent;
  border: none;
  border-bottom: 2px solid #d6d3d1;
  outline: none;
  padding: 12px 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  color: #1c1917;
}
.input:focus { border-bottom-color: #1c1917; }
.input:disabled { opacity: 0.4; }
.feedback {
  height: 24px;
  margin-top: 12px;
  font-size: 14px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.feedback .ok { color: #15803d; }
.feedback .bad { color: #b91c1c; }

/* Result screen */
.result {
  width: 100%;
  max-width: 384px;
  text-align: center;
  margin: 0 auto;
}
.result-score {
  font-size: 72px;
  font-weight: 900;
  font-variant-numeric: tabular-nums;
}
.result-meta {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  color: #78716c;
  margin-top: 12px;
}

/* Buttons */
.btn-primary {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  background: #1c1917;
  color: #fafaf9;
  font-size: 16px;
  font-weight: 600;
  transition: background 0.15s;
}
.btn-primary:active { background: #c2410c; }
.btn-primary.lg {
  padding: 20px;
  font-size: 18px;
}
.btn-primary.mt-lg { margin-top: 40px; }
.btn-secondary {
  width: 100%;
  padding: 12px;
  border-radius: 16px;
  background: #e7e5e4;
  color: #57534e;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s;
}
.btn-secondary:active { background: #d6d3d1; }

/* Bottom controls */
.controls {
  padding: 8px 16px 24px;
  border-top: 1px solid rgba(231, 229, 228, 0.6);
}
.pills {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 12px 0;
}
.pill {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 0;
  border-radius: 9999px;
  border: 1px solid #d6d3d1;
  background: white;
  color: #57534e;
  transition: all 0.15s;
}
.pill.active {
  background: #1c1917;
  color: #fafaf9;
  border-color: #1c1917;
}
.pill:disabled { opacity: 0.4; }

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 8px;
}
.mode-toggle {
  display: flex;
  gap: 4px;
  background: #e7e5e4;
  border-radius: 9999px;
  padding: 2px;
}
.mode-btn {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 9999px;
  color: #57534e;
  transition: all 0.15s;
}
.mode-btn.active {
  background: #1c1917;
  color: #fafaf9;
}
.timer {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #44403c;
}
.timer.warn {
  color: #c2410c;
  animation: tk 1s steps(1, end) infinite;
}
.counter {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  color: #78716c;
}
.counter .slash { color: #a8a29e; }

.action-row { padding-top: 8px; }

/* Animations */
.pulse-ok { animation: po 0.35s ease-out; }
.pulse-bad { animation: sh 0.35s ease-in-out; }
@keyframes po {
  0% { transform: scale(1); }
  40% { transform: scale(1.03); }
  100% { transform: scale(1); }
}
@keyframes sh {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
@keyframes tk {
  50% { opacity: 0.4; }
}

.hidden { display: none !important; }

  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Stage -->
    <div class="stage" id="stage">
      <!-- Result screen -->
      <div class="result hidden" id="result">
        <div class="result-score" id="resultScore">0</div>
        <div class="result-meta" id="resultMeta">0% · streak 0</div>
        <button class="btn-primary mt-lg" id="againBtn">Again</button>
      </div>

  <!-- Start screen -->
  <div class="result hidden" id="startScreen">
    <button class="btn-primary lg" id="startBtn">Start</button>
  </div>

  <!-- Active prompt -->
  <div class="stage-inner" id="active">
    <div class="prompt" id="prompt">A</div>
    <input
      class="input"
      id="input"
      type="text"
      autocomplete="off"
      autocapitalize="characters"
      autocorrect="off"
      spellcheck="false"
      maxlength="2"
      inputmode="text"
    />
    <div class="feedback" id="feedback"></div>
  </div>
</div>

<!-- Bottom controls -->
<div class="controls">
  <!-- Direction pills -->
  <div class="pills" id="pills"></div>

  <!-- Mode + counter/timer -->
  <div class="toolbar">
    <div class="mode-toggle" id="modeToggle"></div>
    <div id="statusReadout"></div>
  </div>

  <!-- Action button -->
  <div class="action-row hidden" id="actionRow">
    <button class="btn-secondary" id="actionBtn">Reset</button>
  </div>
</div>

  </div>

  <script>
    // ============ Constants ============
    const DIRECTIONS = { N2L: "N→L", L2N: "L→N", MIX: "Mix", WORD: "Word" };
    const MODES = { PRACTICE: "Practice", SPRINT: "Sprint" };

    const WORDS = [
      "cat","dog","run","sky","owl","tea","map","pen","jar","fox",
      "moon","salt","ship","code","leaf","wolf","jazz","quiz","kite","frog",
      "echo","rain","wave","mint","bird","harp","comb","drum","vine","zinc",
      "amber","cloud","piano","river","flame","ghost","pixel","forge","glove","tiger",
      "onion","quilt","bravo","clasp","dwarf","ember","flint","glyph","haven","ivory",
      "garden","puzzle","shadow","rhythm","wizard","jungle","silver","canvas","breeze","velvet",
      "lantern","compass","quantum","whisper","harvest","mystery","crystal","journey","twilight","kingdom",
    ];

    const letterFor = (n) => String.fromCharCode(64 + n);
    const numberFor = (l) => l.toUpperCase().charCodeAt(0) - 64;
    const randomWord = () => WORDS[Math.floor(Math.random() * WORDS.length)];
    const wordToNumbers = (w) => w.toUpperCase().split("").map(numberFor).join(" ");

    function makePrompt(direction) {
      if (direction === "WORD") {
        const w = randomWord();
        return { kind: "WORD", question: wordToNumbers(w), answer: w.toUpperCase() };
      }
      const n = Math.floor(Math.random() * 26) + 1;
      let dir = direction;
      if (direction === "MIX") dir = Math.random() < 0.5 ? "N2L" : "L2N";
      if (dir === "N2L") return { kind: "N2L", question: String(n), answer: letterFor(n) };
      return { kind: "L2N", question: letterFor(n), answer: String(n) };
    }

    function normalize(input, kind) {
      const s = input.trim();
      if (!s) return "";
      if (kind === "L2N") return s.replace(/^0+/, "");
      return s.toUpperCase();
    }

    // ============ State ============
    let state = {
      mode: "PRACTICE",
      direction: "N2L",
      prompt: makePrompt("N2L"),
      stats: { correct: 0, wrong: 0, streak: 0, best: 0 },
      sprintActive: false,
      timeLeft: 60,
      sprintResult: null,
    };

    let timerId = null;
    let feedbackTimeout = null;

    // ============ DOM refs ============
    const el = {
      app: document.getElementById("app"),
      stage: document.getElementById("stage"),
      result: document.getElementById("result"),
      resultScore: document.getElementById("resultScore"),
      resultMeta: document.getElementById("resultMeta"),
      againBtn: document.getElementById("againBtn"),
      startScreen: document.getElementById("startScreen"),
      startBtn: document.getElementById("startBtn"),
      active: document.getElementById("active"),
      prompt: document.getElementById("prompt"),
      input: document.getElementById("input"),
      feedback: document.getElementById("feedback"),
      pills: document.getElementById("pills"),
      modeToggle: document.getElementById("modeToggle"),
      statusReadout: document.getElementById("statusReadout"),
      actionRow: document.getElementById("actionRow"),
      actionBtn: document.getElementById("actionBtn"),
    };

    // ============ Build static UI ============
    function buildPills() {
      el.pills.innerHTML = "";
      Object.entries(DIRECTIONS).forEach(([k, v]) => {
        const btn = document.createElement("button");
        btn.className = "pill";
        btn.textContent = v;
        btn.dataset.key = k;
        btn.addEventListener("click", () => setDirection(k));
        el.pills.appendChild(btn);
      });
    }

    function buildModeToggle() {
      el.modeToggle.innerHTML = "";
      Object.entries(MODES).forEach(([k, v]) => {
        const btn = document.createElement("button");
        btn.className = "mode-btn";
        btn.textContent = v;
        btn.dataset.key = k;
        btn.addEventListener("click", () => {
          if (state.sprintActive) endSprint();
          state.mode = k;
          reset();
          render();
        });
        el.modeToggle.appendChild(btn);
      });
    }

    // ============ Actions ============
    function setDirection(d) {
      if (state.sprintActive) return;
      state.direction = d;
      state.prompt = makePrompt(d);
      el.input.value = "";
      clearFeedback();
      render();
    }

    function nextPrompt() {
      state.prompt = makePrompt(state.direction);
      el.input.value = "";
      render();
    }

    function startSprint() {
      state.stats = { correct: 0, wrong: 0, streak: 0, best: 0 };
      state.timeLeft = 60;
      state.sprintResult = null;
      state.sprintActive = true;
      state.prompt = makePrompt(state.direction);
      el.input.value = "";
      clearFeedback();
      render();
      el.input.focus();

      timerId = setInterval(() => {
        state.timeLeft--;
        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          state.sprintActive = false;
          state.sprintResult = state.sprintResult ?? "done";
          clearInterval(timerId);
          timerId = null;
        }
        render();
      }, 1000);
    }

    function endSprint() {
      state.sprintActive = false;
      state.sprintResult = "stopped";
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      render();
    }

    function reset() {
      state.stats = { correct: 0, wrong: 0, streak: 0, best: 0 };
      state.sprintResult = null;
      state.prompt = makePrompt(state.direction);
      el.input.value = "";
      clearFeedback();
      render();
    }

    function clearFeedback() {
      el.feedback.innerHTML = "";
      el.active.classList.remove("pulse-ok", "pulse-bad");
      if (feedbackTimeout) {
        clearTimeout(feedbackTimeout);
        feedbackTimeout = null;
      }
    }

    function showFeedback(kind, was) {
      el.active.classList.remove("pulse-ok", "pulse-bad");
      // force reflow so animation restarts
      void el.active.offsetWidth;
      if (kind === "ok") {
        el.active.classList.add("pulse-ok");
        el.feedback.innerHTML = '<span class="ok">✓</span>';
        if (feedbackTimeout) clearTimeout(feedbackTimeout);
        feedbackTimeout = setTimeout(() => {
          el.feedback.innerHTML = "";
        }, 350);
      } else {
        el.active.classList.add("pulse-bad");
        el.feedback.innerHTML = `<span class="bad">${was}</span>`;
        if (feedbackTimeout) clearTimeout(feedbackTimeout);
        feedbackTimeout = setTimeout(() => {
          el.feedback.innerHTML = "";
        }, 900);
      }
    }

    function submit(value) {
      const normalized = normalize(value, state.prompt.kind);
      if (!normalized) return;
      const ok = normalized === state.prompt.answer;

      if (ok) {
        const streak = state.stats.streak + 1;
        state.stats = {
          correct: state.stats.correct + 1,
          wrong: state.stats.wrong,
          streak,
          best: Math.max(state.stats.best, streak),
        };
        if (state.mode === "PRACTICE") showFeedback("ok");
        nextPrompt();
      } else {
        state.stats.wrong++;
        state.stats.streak = 0;
        if (state.mode === "PRACTICE") {
          showFeedback("bad", state.prompt.answer);
          el.input.value = "";
          render();
        } else {
          nextPrompt();
        }
      }
    }

    // ============ Render ============
    function render() {
      const { mode, direction, prompt, stats, sprintActive, timeLeft, sprintResult } = state;
      const total = stats.correct + stats.wrong;
      const accuracy = total === 0 ? 0 : Math.round((stats.correct / total) * 100);
      const inputDisabled = mode === "SPRINT" && !sprintActive;
      const showResult = mode === "SPRINT" && !sprintActive && sprintResult && total > 0;
      const showStartScreen = mode === "SPRINT" && !sprintActive && !sprintResult;

      // Pills
      Array.from(el.pills.children).forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.key === direction);
        btn.disabled = sprintActive;
      });

      // Mode toggle
      Array.from(el.modeToggle.children).forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.key === mode);
      });

      // Status readout (timer or counter)
      if (mode === "SPRINT") {
        const mins = Math.floor(timeLeft / 60);
        const secs = String(timeLeft % 60).padStart(2, "0");
        const warn = timeLeft <= 10 && sprintActive;
        el.statusReadout.innerHTML = `<div class="timer ${warn ? "warn" : ""}">${mins}:${secs}</div>`;
      } else {
        el.statusReadout.innerHTML = `<div class="counter">${stats.correct}<span class="slash">/</span>${total}</div>`;
      }

      // Stage panels
      el.result.classList.toggle("hidden", !showResult);
      el.startScreen.classList.toggle("hidden", !showStartScreen);
      el.active.classList.toggle("hidden", showResult || showStartScreen);

      if (showResult) {
        el.resultScore.textContent = stats.correct;
        el.resultMeta.textContent = `${accuracy}% · streak ${stats.best}`;
      }

      // Active prompt
      if (!showResult && !showStartScreen) {
        el.prompt.textContent = prompt.question;
        el.prompt.classList.toggle("word", prompt.kind === "WORD");
        el.input.disabled = inputDisabled;
        const newInputMode = prompt.kind === "L2N" ? "numeric" : "text";
        if (el.input.inputMode !== newInputMode) el.input.inputMode = newInputMode;
        const newMaxLength = prompt.kind === "WORD" ? 20 : (prompt.kind === "L2N" ? 3 : 2);
        if (el.input.maxLength !== newMaxLength) el.input.maxLength = newMaxLength;
      }

      // Action button
      const showAction =
        !showResult &&
        !showStartScreen &&
        ((mode === "SPRINT" && sprintActive) || mode === "PRACTICE");
      el.actionRow.classList.toggle("hidden", !showAction);
      if (showAction) {
        if (mode === "SPRINT" && sprintActive) {
          el.actionBtn.textContent = "Stop";
          el.actionBtn.onclick = endSprint;
        } else {
          el.actionBtn.textContent = "Reset";
          el.actionBtn.onclick = reset;
        }
      }
    }

    // ============ Events ============
    el.input.addEventListener("input", (e) => {
      const v = e.target.value;
      if (state.mode === "SPRINT" && !state.sprintActive) return;
      if (state.prompt.kind === "N2L") {
        const c = v.trim();
        if (c.length >= 1 && /^[A-Za-z]$/.test(c)) submit(c);
      }
    });

    el.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submit(el.input.value);
      }
    });

    el.startBtn.addEventListener("click", startSprint);
    el.againBtn.addEventListener("click", startSprint);

    // ============ Keyboard / scroll fix backstop ============
    // interactive-widget=resizes-content in the meta tag does the heavy lifting.
    // This is just a backstop in case Safari tries to scroll anyway.
    function pinTop() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", pinTop);
      window.visualViewport.addEventListener("scroll", pinTop);
    }
    window.addEventListener("scroll", pinTop, { passive: true });

    // ============ Init ============
    buildPills();
    buildModeToggle();
    render();
  </script>

</body>
</html>
