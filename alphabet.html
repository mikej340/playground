<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Alphabet Trainer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      overflow: hidden;
      overscroll-behavior: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      width: 100%;
      background: #f5f5f4;
      color: #1c1917;
      font-family: ui-sans-serif, system-ui, -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
      background: none;
      padding: 0;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
    }
    input {
      font-family: inherit;
      -webkit-appearance: none;
      appearance: none;
    }

.mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
.tabular { font-variant-numeric: tabular-nums; }

/* Layout */
.app {
  width: 100%;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Stage */
.stage {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  padding: 32px 24px 16px;
  min-height: 0;
}
.stage-inner {
  width: 100%;
  text-align: center;
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  min-height: 0;
}
.prompt {
  font-weight: 900;
  line-height: 1;
  letter-spacing: -0.025em;
  user-select: none;
  word-break: break-word;
  font-size: 96px;
}
.prompt.word {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 30px;
  letter-spacing: 0.05em;
  white-space: pre-line;
}
.prompt-line {
  display: block;
}
.input {
  margin-top: 40px;
  width: 100%;
  max-width: 320px;
  text-align: center;
  align-self: center;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 0.1em;
  background: transparent;
  border: none;
  border-bottom: 2px solid #d6d3d1;
  outline: none;
  padding: 12px 0;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  color: #1c1917;
}
.input:focus { border-bottom-color: #1c1917; }
.input:disabled { opacity: 0.4; }
.choices {
  margin-top: 22px;
  width: 100%;
  max-width: 380px;
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
}
.choice-btn {
  border: 1px solid #d6d3d1;
  border-radius: 14px;
  padding: 14px 6px;
  background: #fff;
  color: #1c1917;
  font-size: 24px;
  font-weight: 700;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.stage-choices {
  margin-top: auto;
  margin-bottom: 8px;
}
.choice-btn:active { background: #f5f5f4; }
.feedback {
  height: 36px;
  margin-top: 12px;
  font-size: 28px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
}
.feedback .ok { color: #15803d; }
.feedback .bad { color: #b91c1c; }
.prompt-timer {
  height: 20px;
  margin-top: 6px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 13px;
  font-variant-numeric: tabular-nums;
  color: #a8a29e;
}
.prompt-timer.warn { color: #c2410c; }

/* Idle card */
.idle-card {
  width: 100%;
  max-width: 384px;
  margin: 0 auto;
  border: 1px solid #d6d3d1;
  border-radius: 24px;
  background: #fafaf9;
  overflow: hidden;
}
.idle-head {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px;
  padding: 18px 14px;
}
.idle-col { text-align: center; }
.idle-label {
  font-size: 13px;
  color: #78716c;
  margin-bottom: 8px;
}
.idle-pill {
  background: #f1f0ef;
  border-radius: 14px;
  padding: 10px 0;
  font-size: 20px;
  font-weight: 700;
}
.idle-divider {
  height: 1px;
  background: #e7e5e4;
}
.idle-main {
  padding: 18px 16px 20px;
  text-align: center;
}
.idle-sub {
  font-size: 13px;
  color: #78716c;
}
.idle-score {
  margin-top: 8px;
  font-size: 82px;
  font-weight: 900;
  line-height: 1;
  font-variant-numeric: tabular-nums;
}
.idle-meta {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  color: #78716c;
  margin-top: 6px;
}
.last-attempt {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px dashed #d6d3d1;
}
.last-attempt-title {
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #78716c;
  margin-bottom: 4px;
}
.last-attempt-line {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  color: #57534e;
}

/* Buttons */
.btn-primary {
  width: 100%;
  padding: 16px;
  border-radius: 16px;
  background: #1c1917;
  color: #fafaf9;
  font-size: 16px;
  font-weight: 600;
  transition: background 0.15s;
}
.btn-primary:active { background: #c2410c; }
.btn-primary.lg {
  padding: 20px;
  font-size: 18px;
}
.btn-primary.mt-lg { margin-top: 40px; }
.btn-secondary {
  width: 100%;
  padding: 12px;
  border-radius: 16px;
  background: #e7e5e4;
  color: #57534e;
  font-size: 14px;
  font-weight: 500;
  transition: background 0.15s;
}
.btn-secondary:active { background: #d6d3d1; }

/* Bottom controls */
.controls {
  padding: 8px 16px 24px;
  border-top: 1px solid rgba(231, 229, 228, 0.6);
}
.pills {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 6px;
  padding: 12px 0;
}
.pill {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 0;
  border-radius: 9999px;
  border: 1px solid #d6d3d1;
  background: white;
  color: #57534e;
  transition: all 0.15s;
}
.pill.active {
  background: #1c1917;
  color: #fafaf9;
  border-color: #1c1917;
}
.pill:disabled { opacity: 0.4; }

.toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: 8px;
}
.mode-toggle {
  display: flex;
  gap: 4px;
  background: #e7e5e4;
  border-radius: 9999px;
  padding: 2px;
}
.mode-btn {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 12px;
  border-radius: 9999px;
  color: #57534e;
  transition: all 0.15s;
}
.mode-btn.active {
  background: #1c1917;
  color: #fafaf9;
}
.mode-btn:disabled { opacity: 0.4; }
.timer {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 18px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: #44403c;
}
.timer.warn {
  color: #c2410c;
  animation: tk 1s steps(1, end) infinite;
}
.counter {
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
  color: #78716c;
}
.counter .slash { color: #a8a29e; }

.action-row { padding-bottom: 4px; }

/* Animations */
.pulse-ok { animation: po 0.35s ease-out; }
.pulse-bad { animation: sh 0.35s ease-in-out; }
@keyframes po {
  0% { transform: scale(1); }
  40% { transform: scale(1.03); }
  100% { transform: scale(1); }
}
@keyframes sh {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  75% { transform: translateX(5px); }
}
@keyframes tk {
  50% { opacity: 0.4; }
}

.hidden { display: none !important; }

/* Timeout toggle */
.timeout-row {
  display: flex;
  gap: 6px;
  padding-bottom: 6px;
}
.timeout-btn {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 0;
  border-radius: 9999px;
  border: 1px solid #d6d3d1;
  background: white;
  color: #57534e;
  transition: all 0.15s;
}
.timeout-btn.active {
  background: #1c1917;
  color: #fafaf9;
  border-color: #1c1917;
}
.practice-input-row {
  display: flex;
  gap: 6px;
  padding-bottom: 6px;
}
.practice-input-btn {
  flex: 1;
  font-size: 12px;
  font-weight: 500;
  padding: 6px 0;
  border-radius: 9999px;
  border: 1px solid #d6d3d1;
  background: white;
  color: #57534e;
  transition: all 0.15s;
}
.practice-input-btn.active {
  background: #1c1917;
  color: #fafaf9;
  border-color: #1c1917;
}

/* Stats view */
.stats-btn {
  font-size: 12px;
  font-weight: 500;
  color: #78716c;
  padding: 4px 8px;
  border-radius: 8px;
}
.stats-btn:active { color: #1c1917; }
.stats-view {
  position: fixed;
  inset: 0;
  background: #f5f5f4;
  overflow-y: auto;
  z-index: 10;
  padding: 24px 16px 40px;
}
.stats-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 24px;
}
.stats-title { font-size: 20px; font-weight: 700; }
.stats-close {
  font-size: 20px;
  line-height: 1;
  color: #57534e;
  padding: 4px 8px;
}
.stats-section { margin-bottom: 28px; }
.stats-section.tappable {
  cursor: pointer;
  user-select: none;
}
.stats-section-title {
  font-size: 11px;
  font-weight: 600;
  color: #78716c;
  text-transform: uppercase;
  letter-spacing: 0.06em;
  margin-bottom: 8px;
}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 5px;
}
.stats-cell {
  border-radius: 8px;
  padding: 8px 2px 6px;
  text-align: center;
  background: #e7e5e4;
}
.stats-cell.none { opacity: 0.35; }
.stats-cell.good { background: #bbf7d0; }
.stats-cell.ok   { background: #fef08a; }
.stats-cell.bad  { background: #fecaca; }
.stats-cell.freq {
  color: #0f172a;
}
.stats-letter { font-size: 17px; font-weight: 700; line-height: 1; }
.stats-num {
  font-size: 9px;
  font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
  color: #44403c;
  margin-top: 3px;
  line-height: 1.4;
}
.sprint-bests { display: flex; flex-direction: column; gap: 8px; }
.sprint-empty { font-size: 13px; color: #a8a29e; }
.sprint-row { display: flex; align-items: baseline; gap: 10px; }
.sprint-rank { font-size: 11px; color: #a8a29e; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; width: 22px; }
.sprint-score { font-size: 30px; font-weight: 900; line-height: 1; font-variant-numeric: tabular-nums; }
.sprint-detail { font-size: 13px; color: #78716c; }

  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- Stats view (full-screen overlay) -->
    <div class="stats-view hidden" id="statsView"></div>

    <!-- Stage -->
    <div class="stage" id="stage">
      <!-- Idle card -->
      <div class="idle-card hidden" id="idleCard">
        <div class="idle-head">
          <div class="idle-col">
            <div class="idle-label">Mode</div>
            <div class="idle-pill" id="idleDirection">N→L</div>
          </div>
          <div class="idle-col">
            <div class="idle-label">Session Type</div>
            <div class="idle-pill" id="idleSession">Practice</div>
          </div>
        </div>
        <div class="idle-divider"></div>
        <div class="idle-main">
          <div class="idle-sub">Best 60s Sprint</div>
          <div class="idle-score" id="idleBest">—</div>
          <div class="idle-meta hidden" id="idleBestMeta"></div>
          <div class="last-attempt hidden" id="lastAttempt">
            <div class="last-attempt-title">Last Attempt</div>
            <div class="last-attempt-line" id="lastAttemptLine"></div>
          </div>
        </div>
      </div>

  <!-- Active prompt -->
  <div class="stage-inner" id="active">
    <div class="prompt" id="prompt">A</div>
    <input
      class="input"
      id="input"
      type="text"
      autocomplete="off"
      autocapitalize="characters"
      autocorrect="off"
      spellcheck="false"
      maxlength="2"
      inputmode="text"
    />
    <div class="feedback" id="feedback"></div>
    <div class="prompt-timer" id="promptTimer"></div>
  </div>
  <div class="choices stage-choices hidden" id="choices"></div>
</div>

<!-- Bottom controls -->
<div class="controls">
  <!-- Timeout toggle (practice mode, non-word) -->
  <div class="timeout-row hidden" id="timeoutRow"></div>
  <div class="practice-input-row hidden" id="practiceInputRow"></div>

  <!-- Action button (Start / Stop) — above pills -->
  <div class="action-row hidden" id="actionRow">
    <button class="btn-primary" id="actionBtn">Start</button>
  </div>

  <!-- Direction pills -->
  <div class="pills" id="pills"></div>

  <!-- Mode toggle -->
  <div class="toolbar">
    <div class="mode-toggle" id="modeToggle"></div>
    <button class="stats-btn" id="statsBtn">Stats</button>
  </div>
</div>

  </div>

  <script>
    // ============ Constants ============
    const DIRECTIONS = { N2L: "N→L", L2N: "L→N", MIX: "Mix", WORD: "Word" };
    const MODES = { PRACTICE: "Practice", SPRINT: "Sprint" };
    const STORAGE_KEYS = {
      STATS: "alphabet-trainer-stats",
      SPRINT_BESTS: "alphabet-trainer-sprints",
      SPRINT_SUMMARIES: "alphabet-trainer-sprint-summaries",
    };
    const INITIAL_RUN_STATS = { correct: 0, wrong: 0, streak: 0, best: 0 };
    const TIMEOUT_OPTIONS = { DEFAULT: [5, 10, 20], WORD: [10, 30, 60], WORD_EASTER_EGG: [60, 120, 180] };
    const NFL_EASTER_EGG_PHRASE = "DRAXX THEM SKLOUNST";

    const WORDS = [
      "cat","dog","run","sky","owl","tea","map","pen","jar","fox",
      "moon","salt","ship","code","leaf","wolf","jazz","quiz","kite","frog",
      "echo","rain","wave","mint","bird","harp","comb","drum","vine","zinc",
      "amber","cloud","piano","river","flame","ghost","pixel","forge","glove","tiger",
      "onion","quilt","bravo","clasp","dwarf","ember","flint","glyph","haven","ivory",
      "garden","puzzle","shadow","rhythm","wizard","jungle","silver","canvas","breeze","velvet",
      "lantern","compass","quantum","whisper","harvest","mystery","crystal","journey","twilight","kingdom",
    ];
    const NFL_WORDS = [
      "Koolaid McKinstry",
      "Chop Robinson",
      "TJ Tampa",
      "Spencer Rattler",
      "Storm Duck",
      "Bump CooperJr",
      "Beau Brade",
      "Ruke Orhorhoro",
      "DJ Glaze",
      "Bub Means",
      "Chad OchoCinco",
      "Dick Butkus",
      "HaHa ClintonDix",
      "Barkevious Mingo",
      "Guy Whimper",
      "DBrickashaw Ferguson",
      "Captain Munnerlyn",
      "BenJarvus GreenEllis",
      "Fair Hooker",
      "JohnDavid Booty",
      "Earthwind Moreland",
      "Richie Incognito",
      "Tiki Barber",
      "Prince Amukamara",
      "Frostee Rucker",
      "Tshimanga Biakabutuka",
      "Ben Gay",
      "Aqib Talib",
      "Rex Grossman",
      "Ashton Youboty",
      "CJ AhYou",
      "General Booty",
      "Coy Bacon",
      "Hercules Mataafa",
      "Bronko Nagurski",
      "RockYa Sin",
      "KyuBlu Kelly",
      "JuJu SmithSchuster",
      "Sauce Gardner",
      "Legedu Naanee",
      "Tedy Bruschi",
      "Jake Butt",
      "Champ Bailey",
      "Keyvantanie Coutee",
      "Troy AumuaPolamalu",
      "TJ Houshmandzadeh",
      "Uche Nwaneri",
      "Ikponmwosa Igbinosun",
      "Ephesians Prysock",
    ];

    const letterFor = (n) => String.fromCharCode(64 + n);
    const numberFor = (l) => l.toUpperCase().charCodeAt(0) - 64;
    const randomWord = (pool) => pool[Math.floor(Math.random() * pool.length)];
    const tokenToNumbers = (text) => text.toUpperCase().replace(/[^A-Z]/g, "").split("").map(numberFor).join(" ");
    function wordToNumbers(w, splitNameLines = false) {
      if (!splitNameLines) return tokenToNumbers(w);
      const parts = w.trim().split(/\s+/).filter(Boolean);
      if (parts.length <= 1) return tokenToNumbers(w);
      const first = tokenToNumbers(parts[0]);
      const surname = tokenToNumbers(parts.slice(1).join(""));
      return `${first}\n${surname}`;
    }

    // ============ Stats & weighting ============
    const MIN_ATTEMPTS = 4;

    function emptyProfile() {
      return Object.fromEntries(
        Array.from({ length: 26 }, (_, i) => [String.fromCharCode(65 + i), { a: 0, w: 0, t: 0 }])
      );
    }

    function loadStoredObject(key) {
      try {
        const parsed = JSON.parse(localStorage.getItem(key) || "{}");
        return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : {};
      } catch {
        return {};
      }
    }

    function loadStats() {
      const raw = loadStoredObject(STORAGE_KEYS.STATS);
      return {
        N2L: { ...emptyProfile(), ...(raw.N2L || {}) },
        L2N: { ...emptyProfile(), ...(raw.L2N || {}) },
      };
    }

    function saveStats() {
      localStorage.setItem(STORAGE_KEYS.STATS, JSON.stringify(letterStats));
    }

    let letterStats = loadStats();

    function computeWeights(kind) {
      // Compute global average ms per correct answer across all letters
      let totalTime = 0, totalCorrect = 0;
      Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i)).forEach(letter => {
        const s = letterStats[kind][letter] || { a: 0, w: 0, t: 0 };
        const correct = s.a - s.w;
        if (correct > 0 && s.t > 0) {
          totalTime += s.t;
          totalCorrect += correct;
        }
      });
      const globalAvg = totalCorrect > 0 ? totalTime / totalCorrect : 0;
    
      return Array.from({ length: 26 }, (_, i) => {
        const letter = String.fromCharCode(65 + i);
        const s = letterStats[kind][letter] || { a: 0, w: 0, t: 0 };
        const correct = s.a - s.w;
    
        const errorRate  = s.a > 0 ? s.w / s.a : 0;
        const confidence = Math.min(s.a / MIN_ATTEMPTS, 1);
    
        let timeScore = 0;
        if (globalAvg > 0 && correct > 0 && s.t > 0) {
          const avgTime = s.t / correct;
          timeScore = Math.max(0, avgTime / globalAvg - 1); // 0 at avg, 1.0 at 2× avg
        }
    
        const ALPHA = 0.5; // tune this — 0.5 means 2× slow ≈ half a wrong answer
        return 1 + confidence * (errorRate + ALPHA * timeScore) * 4;
      });
    }
    
    const pickQueues = { N2L: [], L2N: [] };

    function refillQueue(kind) {
      const weights = computeWeights(kind);
      const queue = [];
      weights.forEach((w, i) => {
        const slots = Math.max(1, Math.round(w));
        for (let s = 0; s < slots; s++) queue.push(i + 1);
      });
      // Fisher-Yates shuffle
      for (let i = queue.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [queue[i], queue[j]] = [queue[j], queue[i]];
      }
      pickQueues[kind] = queue;
    }
    
    function weightedPickN(kind) {
      if (pickQueues[kind].length === 0) refillQueue(kind);
      return pickQueues[kind].pop();
    }

    let sprintBests = loadStoredObject(STORAGE_KEYS.SPRINT_BESTS);
    let sprintSummaries = loadStoredObject(STORAGE_KEYS.SPRINT_SUMMARIES);

    function saveSprintBest(direction, correct, wrong) {
      const cur = sprintBests[direction];
      if (!cur || correct > cur.c || (correct === cur.c && wrong < cur.w)) {
        sprintBests[direction] = { c: correct, w: wrong };
        localStorage.setItem(STORAGE_KEYS.SPRINT_BESTS, JSON.stringify(sprintBests));
      }
    }

    function saveSprintSummary(mode, direction, summary) {
      sprintSummaries[`${mode}:${direction}`] = summary;
      localStorage.setItem(STORAGE_KEYS.SPRINT_SUMMARIES, JSON.stringify(sprintSummaries));
    }

    function recordAttempt(kind, letter, correct, elapsedMs) {
      if (kind === "WORD") return;
      const s = letterStats[kind][letter] || { a: 0, w: 0, t: 0 };
      s.a++;
      if (!correct) {
        s.w++;
      }
      if (correct) s.t += elapsedMs;
      letterStats[kind][letter] = s;
      saveStats();
    }


    function makePrompt(direction, nflEasterEggActive = false) {
      if (direction === "WORD") {
        const pool = nflEasterEggActive ? NFL_WORDS : WORDS;
        const w = randomWord(pool);
        return {
          kind: "WORD",
          question: wordToNumbers(w, nflEasterEggActive),
          answer: w.toUpperCase(),
        };
      }
      let dir = direction;
      if (direction === "MIX") dir = Math.random() < 0.5 ? "N2L" : "L2N";
      const n = weightedPickN(dir);
      if (dir === "N2L") return { kind: "N2L", question: String(n), answer: letterFor(n) };
      return { kind: "L2N", question: letterFor(n), answer: String(n) };
    }

    function normalize(input, kind) {
      const s = input.trim();
      if (!s) return "";
      if (kind === "L2N") return s.replace(/^0+/, "");
      return s.toUpperCase();
    }

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function buildPracticeChoices(prompt) {
      if (!prompt || prompt.kind === "WORD") return [];
      const correct = String(prompt.answer);
      const pool = prompt.kind === "N2L"
        ? Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i))
        : Array.from({ length: 26 }, (_, i) => String(i + 1));
      const wrong = shuffle(pool.filter((value) => value !== correct)).slice(0, 3);
      return shuffle([correct, ...wrong]);
    }

    // ============ State ============
    let state = {
      mode: "PRACTICE",
      direction: "N2L",
      prompt: makePrompt("N2L"),
      stats: { ...INITIAL_RUN_STATS },
      sprintActive: false,
      timeLeft: 60,
      practiceActive: false,
      practiceTimeout: 5,
      wordTimeout: 60,
      practiceTimeLeft: 5,
      practiceAnswerMode: "TYPE",
      promptChoices: [],
      statsOpen: false,
      nflEasterEggActive: false,
      statsFrequencyView: { N2L: false, L2N: false },
    };

    let timerId = null;
    let practiceTimerId = null;
    let promptShownAt = null;
    let feedbackTimeout = null;

    // ============ DOM refs ============
    const el = {
      app: document.getElementById("app"),
      stage: document.getElementById("stage"),
      idleCard: document.getElementById("idleCard"),
      idleDirection: document.getElementById("idleDirection"),
      idleSession: document.getElementById("idleSession"),
      idleBest: document.getElementById("idleBest"),
      idleBestMeta: document.getElementById("idleBestMeta"),
      lastAttempt: document.getElementById("lastAttempt"),
      lastAttemptLine: document.getElementById("lastAttemptLine"),
      active: document.getElementById("active"),
      prompt: document.getElementById("prompt"),
      input: document.getElementById("input"),
      feedback: document.getElementById("feedback"),
      promptTimer: document.getElementById("promptTimer"),
      pills: document.getElementById("pills"),
      modeToggle: document.getElementById("modeToggle"),
      timeoutRow: document.getElementById("timeoutRow"),
      practiceInputRow: document.getElementById("practiceInputRow"),
      actionRow: document.getElementById("actionRow"),
      actionBtn: document.getElementById("actionBtn"),
      statsBtn: document.getElementById("statsBtn"),
      statsView: document.getElementById("statsView"),
      choices: document.getElementById("choices"),
    };

    function getDirectionLabel(direction) {
      if (direction === "WORD" && state.nflEasterEggActive) return "🏈🏈🏈";
      return DIRECTIONS[direction];
    }

    function formatTimeoutLabel(seconds) {
      if (seconds % 60 === 0) return `${seconds / 60}m`;
      return `${seconds}s`;
    }

    // ============ Build static UI ============
    function buildPills() {
      el.pills.innerHTML = "";
      Object.entries(DIRECTIONS).forEach(([k, v]) => {
        const btn = document.createElement("button");
        btn.className = "pill";
        btn.textContent = getDirectionLabel(k);
        btn.dataset.key = k;
        btn.addEventListener("click", () => setDirection(k));
        el.pills.appendChild(btn);
      });
    }

    function buildModeToggle() {
      el.modeToggle.innerHTML = "";
      Object.entries(MODES).forEach(([k, v]) => {
        const btn = document.createElement("button");
        btn.className = "mode-btn";
        btn.textContent = v;
        btn.dataset.key = k;
        btn.addEventListener("click", () => {
          if (state.sprintActive) endSprint();
          if (state.practiceActive) stopPractice();
          state.mode = k;
          reset();
        });
        el.modeToggle.appendChild(btn);
      });
    }

    // ============ Actions ============
    function setDirection(d) {
      if (state.sprintActive || state.practiceActive) return;
      state.direction = d;
      reset();
    }

    function nextPrompt() {
      state.prompt = makePrompt(state.direction, state.nflEasterEggActive);
      state.promptChoices = buildPracticeChoices(state.prompt);
      el.input.value = "";
      render();
      if (state.mode === "PRACTICE" && state.practiceActive) startPromptTimer();
    }

    function startSprint() {
      state.stats = { ...INITIAL_RUN_STATS };
      state.timeLeft = 60;
      state.sprintActive = true;
      state.prompt = makePrompt(state.direction, state.nflEasterEggActive);
      state.promptChoices = buildPracticeChoices(state.prompt);
      el.input.value = "";
      clearFeedback();
      render();
      el.input.focus();

      timerId = setInterval(() => {
        state.timeLeft--;
        if (state.timeLeft <= 0) {
          state.timeLeft = 0;
          state.sprintActive = false;
          const total = state.stats.correct + state.stats.wrong;
          const accuracy = total === 0 ? 0 : Math.round((state.stats.correct / total) * 100);
          saveSprintSummary("SPRINT", state.direction, {
            correct: state.stats.correct,
            wrong: state.stats.wrong,
            best: state.stats.best,
            accuracy,
          });
          saveSprintBest(state.direction, state.stats.correct, state.stats.wrong);
          clearInterval(timerId);
          timerId = null;
        }
        render();
      }, 1000);
    }

    function endSprint() {
      state.sprintActive = false;
      if (timerId) {
        clearInterval(timerId);
        timerId = null;
      }
      state.timeLeft = 60;
      state.stats = { ...INITIAL_RUN_STATS };
      state.prompt = makePrompt(state.direction, state.nflEasterEggActive);
      state.promptChoices = buildPracticeChoices(state.prompt);
      el.input.value = "";
      clearFeedback();
      render();
    }

    function startPractice() {
      state.stats = { ...INITIAL_RUN_STATS };
      state.practiceActive = true;
      state.prompt = makePrompt(state.direction, state.nflEasterEggActive);
      state.promptChoices = buildPracticeChoices(state.prompt);
      el.input.value = "";
      clearFeedback();
      render();
      if (state.practiceAnswerMode === "TYPE" || state.direction === "WORD") el.input.focus();
      startPromptTimer();
    }

    function startPromptTimer() {
      clearInterval(practiceTimerId);
      practiceTimerId = null;
      state.practiceTimeLeft = state.direction === "WORD" ? state.wordTimeout : state.practiceTimeout;
      promptShownAt = Date.now();
      render();
      practiceTimerId = setInterval(() => {
        state.practiceTimeLeft--;
        if (state.practiceTimeLeft <= 0) {
          clearInterval(practiceTimerId);
          practiceTimerId = null;
          state.practiceActive = false;
          render();
        } else {
          render();
        }
      }, 1000);
    }

    function stopPractice() {
      clearInterval(practiceTimerId);
      practiceTimerId = null;
      state.practiceActive = false;
    }

    function reset() {
      state.stats = { ...INITIAL_RUN_STATS };
      state.prompt = makePrompt(state.direction, state.nflEasterEggActive);
      state.promptChoices = buildPracticeChoices(state.prompt);
      el.input.value = "";
      clearFeedback();
      render();
    }

    function clearFeedback() {
      el.feedback.innerHTML = "";
      el.active.classList.remove("pulse-ok", "pulse-bad");
      if (feedbackTimeout) {
        clearTimeout(feedbackTimeout);
        feedbackTimeout = null;
      }
    }

    function showFeedback(kind, was) {
      el.active.classList.remove("pulse-ok", "pulse-bad");
      // force reflow so animation restarts
      void el.active.offsetWidth;
      if (kind === "ok") {
        el.active.classList.add("pulse-ok");
        el.feedback.innerHTML = '<span class="ok">✓</span>';
        if (feedbackTimeout) clearTimeout(feedbackTimeout);
        feedbackTimeout = setTimeout(() => {
          el.feedback.innerHTML = "";
        }, 350);
      } else {
        if (kind === "hint") {
          el.feedback.textContent = "🤨";
          return;
        }
        el.active.classList.add("pulse-bad");
        el.feedback.innerHTML = `<span class="bad">${was}</span>`;
        if (feedbackTimeout) clearTimeout(feedbackTimeout);
        feedbackTimeout = setTimeout(() => {
          el.feedback.innerHTML = "";
        }, 900);
      }
    }

    function submit(value) {
      const normalized = normalize(value, state.prompt.kind);
      if (!normalized) return;
      if (state.mode === "PRACTICE" && !state.practiceActive) return;
      if (
        state.mode === "PRACTICE" &&
        state.direction === "WORD" &&
        !state.nflEasterEggActive
      ) {
        const matchesPhrasePrefix = NFL_EASTER_EGG_PHRASE.startsWith(normalized);
        if (normalized === NFL_EASTER_EGG_PHRASE) {
          state.nflEasterEggActive = true;
          state.wordTimeout = Math.max(...TIMEOUT_OPTIONS.WORD_EASTER_EGG);
          stopPractice();
          state.stats = { ...INITIAL_RUN_STATS };
          state.prompt = makePrompt(state.direction, state.nflEasterEggActive);
          state.promptChoices = buildPracticeChoices(state.prompt);
          el.input.value = "";
          clearFeedback();
          render();
          return;
        }
        if (matchesPhrasePrefix) {
          if (normalized.length >= state.prompt.answer.length) {
            showFeedback("hint");
          }
          return;
        }
        clearFeedback();
      }
      const ok = normalized === state.prompt.answer;
      const elapsedMs = promptShownAt ? Date.now() - promptShownAt : 0;
      const letter = state.prompt.kind === "N2L" ? state.prompt.answer : state.prompt.question;

      if (ok) {
        const streak = state.stats.streak + 1;
        state.stats = {
          correct: state.stats.correct + 1,
          wrong: state.stats.wrong,
          streak,
          best: Math.max(state.stats.best, streak),
        };
        if (state.mode === "PRACTICE") {
          recordAttempt(state.prompt.kind, letter, true, elapsedMs);
          showFeedback("ok");
        }
        nextPrompt();
      } else {
        state.stats.wrong++;
        state.stats.streak = 0;
        if (state.mode === "PRACTICE") {
          recordAttempt(state.prompt.kind, letter, false, elapsedMs);
          showFeedback("bad", state.prompt.answer);
          el.input.value = "";
          render();
        } else {
          nextPrompt();
        }
      }
    }

    function fitWordPrompt() {
      if (state.prompt.kind !== "WORD") {
        el.prompt.style.fontSize = "";
        el.prompt.textContent = state.prompt.question;
        return;
      }
      const maxSize = 30;
      const minSize = 11;
      const availableWidth = Math.max(0, (el.prompt.clientWidth || el.active.clientWidth) - 8);
      const lines = String(state.prompt.question || "").split("\n").filter((line) => line.length > 0);
      const measureCanvas = document.createElement("canvas");
      const measureCtx = measureCanvas.getContext("2d");
      const letterSpacingEm = 0.05;
      const fontFamily = "ui-monospace, SFMono-Regular, Menlo, monospace";
      const fontWeight = 900;

      function lineFits(lineText, sizePx) {
        if (!measureCtx) return true;
        measureCtx.font = `${fontWeight} ${sizePx}px ${fontFamily}`;
        const baseWidth = measureCtx.measureText(lineText).width;
        const spacingWidth = Math.max(0, lineText.length - 1) * (sizePx * letterSpacingEm);
        return baseWidth + spacingWidth <= availableWidth;
      }

      const lineSizes = lines.map((line) => {
        let size = maxSize;
        while (size > minSize && !lineFits(line, size)) size -= 1;
        return size;
      });

      el.prompt.innerHTML = "";
      lines.forEach((line, idx) => {
        const span = document.createElement("span");
        span.className = "prompt-line";
        span.textContent = line;
        span.style.fontSize = `${lineSizes[idx]}px`;
        el.prompt.appendChild(span);
      });
    }

    // ============ Render ============
    function render() {
      const { mode, direction, prompt, sprintActive, timeLeft, practiceActive, practiceTimeLeft } = state;
      const pickModeActive = mode === "PRACTICE" && state.practiceAnswerMode === "PICK" && prompt.kind !== "WORD";
      const inputDisabled = (mode === "SPRINT" && !sprintActive) || (mode === "PRACTICE" && !practiceActive) || pickModeActive;
      const showStartScreen = (mode === "SPRINT" && !sprintActive) || (mode === "PRACTICE" && !practiceActive);

      // Pills
      Array.from(el.pills.children).forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.key === direction);
        btn.disabled = sprintActive || practiceActive;
        if (btn.dataset.key === "WORD") btn.textContent = getDirectionLabel("WORD");
      });

      // Mode toggle
      Array.from(el.modeToggle.children).forEach((btn) => {
        btn.classList.toggle("active", btn.dataset.key === mode);
        btn.disabled = sprintActive || practiceActive;
      });

      // Stats overlay
      el.statsView.classList.toggle("hidden", !state.statsOpen);

      // Countdown in stage (below input, stays above keyboard)
      if (mode === "SPRINT" && sprintActive) {
        const mins = Math.floor(timeLeft / 60);
        const secs = String(timeLeft % 60).padStart(2, "0");
        const warn = timeLeft <= 10;
        el.promptTimer.textContent = `${mins}:${secs}`;
        el.promptTimer.className = `prompt-timer${warn ? " warn" : ""}`;
      } else if (mode === "PRACTICE" && practiceActive) {
        const warnAt = (direction === "WORD" ? state.wordTimeout : state.practiceTimeout) > 10 ? 5 : 2;
        el.promptTimer.textContent = formatTimeoutLabel(practiceTimeLeft);
        el.promptTimer.className = `prompt-timer${practiceTimeLeft <= warnAt ? " warn" : ""}`;
      } else {
        el.promptTimer.textContent = "";
        el.promptTimer.className = "prompt-timer";
      }

      // Stage panels
      el.idleCard.classList.toggle("hidden", !showStartScreen);
      el.active.classList.toggle("hidden", showStartScreen);

      if (showStartScreen) {
        const best = sprintBests[direction];
        el.idleDirection.textContent = getDirectionLabel(direction);
        el.idleSession.textContent = MODES[mode];
        el.idleBest.textContent = best ? String(best.c) : "—";
        if (best) {
          el.idleBestMeta.classList.remove("hidden");
          el.idleBestMeta.textContent = best.w === 0 ? "all correct" : `${best.w} incorrect in best run`;
        } else {
          el.idleBestMeta.classList.add("hidden");
          el.idleBestMeta.textContent = "";
        }

        const last = sprintSummaries[`${mode}:${direction}`] || sprintSummaries[`SPRINT:${direction}`];
        const showLastAttempt = Boolean(last);
        el.lastAttempt.classList.toggle("hidden", !showLastAttempt);
        if (showLastAttempt) {
          el.lastAttemptLine.textContent = `${last.correct} correct · ${last.wrong} wrong · ${last.accuracy}% · best streak ${last.best}`;
        } else {
          el.lastAttemptLine.textContent = "";
        }
      }

      // Active prompt
      if (!showStartScreen) {
        el.prompt.textContent = prompt.question;
        el.prompt.classList.toggle("word", prompt.kind === "WORD");
        el.input.disabled = inputDisabled;
        el.input.classList.toggle("hidden", pickModeActive);
        const newInputMode = prompt.kind === "L2N" ? "numeric" : "text";
        if (el.input.inputMode !== newInputMode) el.input.inputMode = newInputMode;
        const newMaxLength = prompt.kind === "WORD" ? 40 : (prompt.kind === "L2N" ? 3 : 2);
        if (el.input.maxLength !== newMaxLength) el.input.maxLength = newMaxLength;
        const showChoices = pickModeActive && practiceActive;
        el.choices.classList.toggle("hidden", !showChoices);
        if (showChoices) {
          el.choices.innerHTML = state.promptChoices.map((choice) =>
            `<button class="choice-btn" data-choice="${choice}">${choice}</button>`
          ).join("");
        } else {
          el.choices.innerHTML = "";
        }
        fitWordPrompt();
      } else {
        el.input.classList.remove("hidden");
        el.choices.classList.add("hidden");
        el.choices.innerHTML = "";
      }

      // Timeout toggle — practice idle only
      const showTimeout = mode === "PRACTICE" && !practiceActive;
      el.timeoutRow.classList.toggle("hidden", !showTimeout);
      if (showTimeout) {
        const opts = direction === "WORD"
          ? (state.nflEasterEggActive ? TIMEOUT_OPTIONS.WORD_EASTER_EGG : TIMEOUT_OPTIONS.WORD)
          : TIMEOUT_OPTIONS.DEFAULT;
        const active = direction === "WORD" ? state.wordTimeout : state.practiceTimeout;
        el.timeoutRow.innerHTML = opts.map(t =>
          `<button class="timeout-btn${active === t ? " active" : ""}" data-t="${t}">${formatTimeoutLabel(t)}</button>`
        ).join("");
      }

      const showPracticeInput = mode === "PRACTICE" && direction !== "WORD" && !practiceActive;
      el.practiceInputRow.classList.toggle("hidden", !showPracticeInput);
      if (showPracticeInput) {
        el.practiceInputRow.innerHTML = `
          <button class="practice-input-btn${state.practiceAnswerMode === "TYPE" ? " active" : ""}" data-answer-mode="TYPE">Keyboard</button>
          <button class="practice-input-btn${state.practiceAnswerMode === "PICK" ? " active" : ""}" data-answer-mode="PICK">Pick 4</button>
        `;
      }

      // Action button — Start when idle, Stop during sprint or active practice
      const showAction = showStartScreen || (mode === "SPRINT" && sprintActive) || (mode === "PRACTICE" && practiceActive);
      el.actionRow.classList.toggle("hidden", !showAction);
      if (showAction) {
        if (showStartScreen) {
          el.actionBtn.textContent = "Start";
          el.actionBtn.className = "btn-primary";
          el.actionBtn.onclick = () => { if (state.mode === "SPRINT") startSprint(); else startPractice(); };
        } else {
          el.actionBtn.textContent = "Stop";
          el.actionBtn.className = "btn-primary";
          el.actionBtn.onclick = mode === "SPRINT" ? endSprint : () => { stopPractice(); render(); };
        }
      }
    }

    // ============ Stats ============
    function renderStats() {
      const LETTERS = Array.from({ length: 26 }, (_, i) => String.fromCharCode(65 + i));

      function frequencyColor(share, maxShare) {
        if (share <= 0 || maxShare <= 0) return "#e7e5e4";
        const strength = Math.max(0.15, Math.min(1, share / maxShare));
        const alpha = 0.12 + strength * 0.58;
        return `rgba(234, 88, 12, ${alpha.toFixed(3)})`;
      }

      function cell(kind, letter, showFrequency) {
        const s = letterStats[kind][letter] || { a: 0, w: 0, t: 0 };
        const totalAttempts = LETTERS.reduce((sum, ltr) => sum + (letterStats[kind][ltr]?.a || 0), 0);
        const maxAttempts = Math.max(...LETTERS.map((ltr) => letterStats[kind][ltr]?.a || 0));
        if (showFrequency) {
          if (totalAttempts === 0 || s.a === 0) {
            return `<div class="stats-cell none freq"><div class="stats-letter">${letter}</div><div class="stats-num">0.0%</div></div>`;
          }
          const pct = (s.a / totalAttempts) * 100;
          const color = frequencyColor(s.a / totalAttempts, maxAttempts / totalAttempts);
          return `<div class="stats-cell freq" style="background:${color};"><div class="stats-letter">${letter}</div><div class="stats-num">${s.a}/${totalAttempts}<br>${pct.toFixed(1)}%</div></div>`;
        }
        if (s.a === 0) {
          return `<div class="stats-cell none"><div class="stats-letter">${letter}</div><div class="stats-num">—</div></div>`;
        }
        const correct = s.a - s.w;
        const acc = Math.round((correct / s.a) * 100);
        const avgMs = correct > 0 ? s.t / correct : null;
        const avgS = avgMs != null ? (avgMs / 1000).toFixed(1) + "s" : "—";
        const cls = acc >= 85 && (avgMs == null || avgMs <= 2500) ? "good"
                  : acc >= 70 ? "ok" : "bad";
        return `<div class="stats-cell ${cls}"><div class="stats-letter">${letter}</div><div class="stats-num">${acc}%<br>${avgS}</div></div>`;
      }

      const SPRINT_MODES = [["N2L","N→L"],["L2N","L→N"],["MIX","Mix"],["WORD","Word"]];
      const sprintRows = SPRINT_MODES.filter(([k]) => sprintBests[k]).map(([k, label]) => {
        const b = sprintBests[k];
        const detail = b.w === 0 ? "all correct" : `${b.w} incorrect`;
        return `<div class="sprint-row">
          <span class="sprint-rank">${label}</span>
          <span class="sprint-score">${b.c}</span>
          <span class="sprint-detail">(${detail})</span>
        </div>`;
      });
      const sprintHTML = sprintRows.length === 0
        ? `<div class="sprint-empty">No completed sprints yet</div>`
        : sprintRows.join("");

      el.statsView.innerHTML = `
        <div class="stats-header">
          <div class="stats-title">Stats</div>
          <button class="stats-close" id="statsClose">✕</button>
        </div>
        <div class="stats-section">
          <div class="stats-section-title">Sprint Bests</div>
          <div class="sprint-bests">${sprintHTML}</div>
        </div>
        <div class="stats-section tappable" data-stats-kind="N2L">
          <div class="stats-section-title">Number → Letter${state.statsFrequencyView.N2L ? " · Frequency Heatmap" : ""}</div>
          <div class="stats-grid">${LETTERS.map(l => cell("N2L", l, state.statsFrequencyView.N2L)).join("")}</div>
        </div>
        <div class="stats-section tappable" data-stats-kind="L2N">
          <div class="stats-section-title">Letter → Number${state.statsFrequencyView.L2N ? " · Frequency Heatmap" : ""}</div>
          <div class="stats-grid">${LETTERS.map(l => cell("L2N", l, state.statsFrequencyView.L2N)).join("")}</div>
        </div>
        <button class="btn-secondary" id="statsClear">Clear all stats</button>
      `;
      document.getElementById("statsClose").addEventListener("click", () => {
        state.statsOpen = false;
        render();
      });
      document.getElementById("statsClear").addEventListener("click", () => {
        if (!confirm("Clear all stats and sprint bests?")) return;
        letterStats = { N2L: emptyProfile(), L2N: emptyProfile() };
        sprintBests = {};
        sprintSummaries = {};
        localStorage.removeItem(STORAGE_KEYS.STATS);
        localStorage.removeItem(STORAGE_KEYS.SPRINT_BESTS);
        localStorage.removeItem(STORAGE_KEYS.SPRINT_SUMMARIES);
        renderStats();
      });
      el.statsView.querySelectorAll("[data-stats-kind]").forEach((section) => {
        section.addEventListener("click", () => {
          const kind = section.dataset.statsKind;
          if (!kind) return;
          state.statsFrequencyView[kind] = !state.statsFrequencyView[kind];
          renderStats();
        });
      });
    }

    // ============ Events ============
    el.input.addEventListener("input", (e) => {
      const v = e.target.value;
      if (state.mode === "SPRINT" && !state.sprintActive) return;
      if (state.mode === "PRACTICE" && !state.practiceActive) return;
      if (state.mode === "PRACTICE" && state.practiceAnswerMode === "PICK" && state.prompt.kind !== "WORD") return;
      if (state.prompt.kind === "N2L") {
        const c = v.trim();
        if (c.length >= 1 && /^[A-Za-z]$/.test(c)) submit(c);
      } else if (state.prompt.kind === "L2N" || state.prompt.kind === "WORD") {
        const c = v.trim();
        if (c.length >= state.prompt.answer.length) submit(c);
      }
    });

    el.input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submit(el.input.value);
      }
    });

    el.timeoutRow.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-t]");
      if (!btn) return;
      const t = Number(btn.dataset.t);
      if (state.direction === "WORD") state.wordTimeout = t;
      else state.practiceTimeout = t;
      render();
    });

    el.practiceInputRow.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-answer-mode]");
      if (!btn) return;
      state.practiceAnswerMode = btn.dataset.answerMode;
      render();
    });

    el.choices.addEventListener("click", (e) => {
      const btn = e.target.closest("[data-choice]");
      if (!btn) return;
      submit(btn.dataset.choice || "");
    });

    el.statsBtn.addEventListener("click", () => {
      state.statsOpen = true;
      renderStats();
      render();
    });

    // ============ Keyboard / scroll fix backstop ============
    // interactive-widget=resizes-content in the meta tag does the heavy lifting.
    // This is just a backstop in case Safari tries to scroll anyway.
    function pinTop() {
      window.scrollTo(0, 0);
      document.documentElement.scrollTop = 0;
      document.body.scrollTop = 0;
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener("resize", pinTop);
      window.visualViewport.addEventListener("scroll", pinTop);
    }
    window.addEventListener("scroll", pinTop, { passive: true });
    window.addEventListener("resize", fitWordPrompt);
